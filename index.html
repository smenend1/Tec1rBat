<script>window.EXERCISES = [{"id": "2t-ex1-centrals-renovables", "exam": "2n trimestre 2025-26", "theme": "Energies renovables i centrals elèctriques", "subthemes": ["alternador", "centrals de bombament", "renovables", "habitatge bioclimàtic"], "type": "Resposta teòrica guiada", "level": "N3", "points": "2 punts", "statement": "Respon: a) Per què l’alternador és l’element central d’una central elèctrica i quina transformació hi té lloc? b) Com funcionen les centrals de bombament i quan actuen? c) Per què les renovables s’anomenen energies alternatives? d) Quatre condicions d’un habitatge bioclimàtic.", "data": ["Alternador: energia mecànica → energia elèctrica", "Central de bombament: bombeja aigua quan sobra energia i turbina quan hi ha demanda", "Renovables: recursos naturals que es regeneren", "Bioclimàtic: orientació, aïllament, ventilació, captació solar i ombres"], "formulas": ["No és un exercici de fórmula única. Cal redactar amb vocabulari tècnic."], "steps": ["Identifica el concepte de cada apartat abans de redactar.", "Explica la transformació energètica de l’alternador.", "Diferencia producció, emmagatzematge i consum en les centrals de bombament.", "Relaciona renovable amb disponibilitat del recurs i impacte ambiental.", "En habitatge bioclimàtic, dona solucions constructives concretes."], "solution": "L’alternador transforma energia mecànica de la turbina en energia elèctrica. Les centrals de bombament consumeixen energia en hores vall per pujar aigua a un embassament superior i la recuperen en hores punta fent-la baixar per turbines. Les energies renovables són alternatives perquè redueixen la dependència de combustibles fòssils i utilitzen recursos que es renoven. Un habitatge bioclimàtic pot tenir bona orientació, aïllament tèrmic, proteccions solars, ventilació creuada, inèrcia tèrmica i aprofitament de llum natural.", "errors": ["Dir que l’alternador genera energia del no-res.", "Confondre renovable amb energia sense cap impacte.", "Donar condicions bioclimàtiques massa genèriques."]}, {"id": "2t-ex2-solar-termosolar", "exam": "2n trimestre 2025-26", "theme": "Energia solar i centrals termosolars", "subthemes": ["DCS", "CRS", "Fresnel", "Disc Stirling"], "type": "Taula comparativa", "level": "N2", "points": "1,5 punts", "statement": "Completa una taula comparativa de tecnologies solars de concentració: DCS, CRS, concentrador lineal Fresnel i central amb disc Stirling. Cal comparar tipus de focus, graus de llibertat, temperatura de treball, fluid caloportador, cost i emmagatzematge.", "data": ["Tecnologies: DCS, CRS, Fresnel, Disc Stirling", "Criteris: focus, moviment, temperatura, fluid, cost, emmagatzematge"], "formulas": ["No hi ha càlcul; cal classificar i comparar."], "steps": ["Llegeix els noms de les tecnologies.", "Separa sistemes de focus lineal i focus puntual.", "Relaciona més temperatura amb més complexitat i cost.", "Diferencia fluid caloportador i sistema d’emmagatzematge."], "solution": "DCS i Fresnel treballen habitualment amb concentració lineal; CRS i Disc Stirling amb concentració més puntual. CRS pot assolir temperatures altes amb heliòstats orientats cap a una torre. Fresnel és més simple i més barat, però amb rendiments inferiors. El disc Stirling concentra en un punt i acciona un motor Stirling. L’emmagatzematge és més viable en grans plantes amb fluids caloportadors o sals foses que en sistemes petits.", "errors": ["Confondre fotovoltaica amb termosolar.", "No distingir focus lineal i puntual.", "Pensar que totes emmagatzemen igual."]}, {"id": "2t-ex3-test-renovables", "exam": "2n trimestre 2025-26", "theme": "Energies renovables i sostenibilitat", "subthemes": ["biomassa", "termosolar", "alternatives"], "type": "Test autocorregible", "level": "N1", "points": "1,5 punts", "statement": "Preguntes tipus test sobre energies renovables: característica principal de les renovables, per què s’anomenen alternatives, què és la biomassa i com funciona una central termosolar de torre.", "data": ["Cada resposta incorrecta resta 0,2 punts.", "Només una opció correcta per pregunta."], "formulas": ["Puntuació = encerts · valor - errors · penalització"], "steps": ["Llegeix totes les opcions abans de marcar.", "Descarta opcions absolutes o falses.", "Justifica mentalment cada resposta."], "solution": "Renovable: recurs que es regenera o és pràcticament inesgotable a escala humana. Alternativa: substitueix fonts no renovables convencionals. Biomassa: matèria orgànica aprofitable energèticament. Central termosolar de torre: heliòstats concentren la radiació en un receptor central per escalfar un fluid i produir electricitat.", "errors": ["Associar renovable a “gratuïta”.", "Dir que biomassa són residus plàstics.", "Confondre fotovoltaica i termosolar."]}, {"id": "3t-parcial-ex1-circuit-mixt", "exam": "Parcial 3r trimestre 2025-26", "theme": "Circuits sèrie, paral·lel i mixt", "subthemes": ["resistència equivalent", "intensitat", "potència"], "type": "Problema numèric amb figura", "level": "N2", "points": "1,5 punts", "statement": "En el circuit de la figura, simplifica i calcula la resistència equivalent, la potència total i la intensitat total.", "data": ["Cal llegir la figura original de l’examen per obtenir valors i connexions."], "formulas": ["Sèrie: Req = R1 + R2 + ...", "Paral·lel: 1/Req = 1/R1 + 1/R2 + ...", "I = V / R", "P = V · I = I² · R = V² / R"], "steps": ["Redibuixa el circuit separant blocs en sèrie i paral·lel.", "Calcula primer les branques més simples.", "Substitueix cada grup per la seva equivalent.", "Quan tinguis Req, calcula I total.", "Calcula P total amb la fórmula més còmoda."], "solution": "La resolució depèn de la figura concreta. El procediment correcte és reduir progressivament el circuit fins a una única resistència equivalent, calcular I = V/Req i després la potència total. Cal incloure unitats en cada pas.", "errors": ["Aplicar fórmula de sèrie a una branca en paral·lel.", "No redibuixar el circuit.", "Oblidar calcular la potència total un cop trobada la intensitat."]}, {"id": "3t-parcial-ex2-quantitat-electricitat", "exam": "Parcial 3r trimestre 2025-26", "theme": "Electricitat bàsica", "subthemes": ["càrrega elèctrica", "electrons", "temps"], "type": "Problema numèric", "level": "N2", "points": "1 punt", "statement": "Calcula la quantitat d’electricitat que ha passat per un circuit si ha circulat un corrent de 2 A durant 2 hores. A quants electrons equival? Dada: 1 electró = 1,602·10⁻¹⁹ C.", "data": ["I = 2 A", "t = 2 h = 7200 s", "e = 1,602·10⁻¹⁹ C"], "formulas": ["Q = I · t", "n = Q / e"], "steps": ["Converteix hores a segons.", "Calcula la càrrega Q en coulombs.", "Divideix la càrrega total per la càrrega d’un electró.", "Expressa el resultat en notació científica."], "solution": "t = 2 h · 3600 = 7200 s. Q = I·t = 2·7200 = 14400 C. Nombre d’electrons: n = 14400 / (1,602·10⁻¹⁹) ≈ 8,99·10²² electrons.", "errors": ["Fer servir hores directament en Q = I·t.", "Multiplicar per la càrrega de l’electró en lloc de dividir.", "No usar notació científica."], "calc": "charge"}, {"id": "3t-parcial-ex3-ohm-motor", "exam": "Parcial 3r trimestre 2025-26", "theme": "Llei d’Ohm i receptors", "subthemes": ["motor CC", "tensió", "resistència"], "type": "Problema numèric", "level": "N2", "points": "1 punt", "statement": "A quina tensió s’ha connectat un motor de corrent continu si té una resistència de 1,2 kΩ i hi circula una intensitat de 400 mA?", "data": ["R = 1,2 kΩ = 1200 Ω", "I = 400 mA = 0,4 A"], "formulas": ["V = I · R"], "steps": ["Converteix kΩ a Ω i mA a A.", "Aplica la llei d’Ohm.", "Presenta la tensió amb volts."], "solution": "R = 1200 Ω i I = 0,4 A. V = I·R = 0,4·1200 = 480 V.", "errors": ["No convertir mA a A.", "No convertir kΩ a Ω.", "Confondre tensió i intensitat."], "calc": "ohm"}, {"id": "3t-parcial-ex4-estufa", "exam": "Parcial 3r trimestre 2025-26", "theme": "Potència i energia elèctrica", "subthemes": ["estufa elèctrica", "energia mensual", "kWh"], "type": "Problema numèric", "level": "N2", "points": "1,25 punts", "statement": "La placa d’una estufa elèctrica indica P = 2,3 kW i V = 230 V. Calcula: a) intensitat del corrent, b) resistència del circuit, c) energia elèctrica en kWh durant un mes si funciona 5 hores diàries.", "data": ["P = 2,3 kW = 2300 W", "V = 230 V", "temps = 5 h/dia · 30 dies = 150 h"], "formulas": ["P = V · I", "R = V / I", "E = P · t"], "steps": ["Passa la potència a W per calcular la intensitat.", "Calcula I = P/V.", "Calcula R = V/I.", "Per energia mensual, usa P en kW i temps en hores."], "solution": "I = P/V = 2300/230 = 10 A. R = V/I = 230/10 = 23 Ω. Energia mensual: E = 2,3 kW · 150 h = 345 kWh.", "errors": ["Barrejar W i kW en la mateixa fórmula.", "Calcular energia amb hores però potència en W sense convertir.", "Oblidar multiplicar pels 30 dies."], "calc": "powerenergy"}, {"id": "3t-parcial-ex5-calefactora-calories", "exam": "Parcial 3r trimestre 2025-26", "theme": "Energia elèctrica i calor", "subthemes": ["efecte Joule", "calories", "temps"], "type": "Problema numèric", "level": "N3", "points": "1 punt", "statement": "Quants minuts haurà d’estar connectada una resistència calefactora de 100 Ω si es connecta a 24 V perquè desprengui 500 calories?", "data": ["R = 100 Ω", "V = 24 V", "Q = 500 cal", "1 cal ≈ 4,184 J"], "formulas": ["P = V² / R", "E = P · t", "E(J) = cal · 4,184"], "steps": ["Converteix calories a joules.", "Calcula la potència de la resistència.", "Aïlla el temps: t = E/P.", "Passa segons a minuts."], "solution": "E = 500·4,184 = 2092 J. P = V²/R = 24²/100 = 5,76 W. t = E/P = 2092/5,76 ≈ 363,2 s = 6,05 min. Caldria uns 6,1 minuts.", "errors": ["No convertir calories a joules.", "Usar P = V·I sense calcular I.", "Donar el temps en segons quan demanen minuts."], "calc": "heat_resistor"}, {"id": "3t-parcial-ex6-serie", "exam": "Parcial 3r trimestre 2025-26", "theme": "Circuits en sèrie", "subthemes": ["tensió parcial", "potència"], "type": "Problema numèric", "level": "N2", "points": "1,25 punts", "statement": "Disposem de tres resistències R1 = 20 Ω, R2 = 40 Ω i R3 = 60 Ω en sèrie a 12 V. Calcula: a) resistència equivalent i intensitat total, b) tensió als borns de cada resistència, c) potència total.", "data": ["R1=20 Ω", "R2=40 Ω", "R3=60 Ω", "V=12 V"], "formulas": ["Req = R1+R2+R3", "I = V/Req", "Vi = I·Ri", "P = V·I"], "steps": ["Suma les resistències.", "Calcula la intensitat total.", "En sèrie, la intensitat és igual a totes les resistències.", "Calcula cada caiguda de tensió.", "Comprova que V1+V2.1+V3 = 12 V."], "solution": "Req = 20+40+60 = 120 Ω. I = 12/120 = 0,1 A. V1=0,1·20=2 V; V2.1=0,1·40=4 V; V3=0,1·60=6 V. Ptotal = V·I = 12·0,1 = 1,2 W.", "errors": ["Pensar que la tensió és igual a cada resistència en sèrie.", "No comprovar la suma de tensions.", "Confondre intensitat total i tensió total."], "calc": "series"}, {"id": "3t-parcial-ex7-mixt-r2", "exam": "Parcial 3r trimestre 2025-26", "theme": "Circuits mixtos", "subthemes": ["potència en una resistència", "resistència equivalent"], "type": "Problema amb figura", "level": "N3", "points": "1,5 punts", "statement": "Simplifica i calcula la resistència equivalent, la intensitat total i la potència de R2 del circuit de la figura.", "data": ["Cal llegir la figura del circuit per obtenir connexions i valors."], "formulas": ["Sèrie: Req = suma", "Paral·lel: 1/Req = suma dels inversos", "P_R2 = I_R2²·R2 = V_R2²/R2"], "steps": ["Redueix el circuit per blocs.", "Troba la tensió o intensitat que afecta R2.", "Calcula la potència específica de R2, no la potència total."], "solution": "La potència de R2 no es pot calcular sense la figura i els valors. El procediment correcte és reduir el circuit fins a trobar la tensió als borns de R2 o la intensitat per R2, i aplicar P = V²/R o P = I²R.", "errors": ["Calcular la potència total i donar-la com si fos la de R2.", "No diferenciar branca i circuit complet."]}, {"id": "3t-parcial-ex8-generador-intern", "exam": "Parcial 3r trimestre 2025-26", "theme": "Generadors i resistència interna", "subthemes": ["resistència interna", "intensitat", "potència"], "type": "Problema amb figura", "level": "N3", "points": "1,5 punts", "statement": "Simplifica i calcula: a) resistència equivalent del circuit inclosa la interna del generador, b) intensitat total, c) potència total.", "data": ["Cal llegir la figura per obtenir el circuit i la resistència interna."], "formulas": ["Req,total = Req,externa + r interna", "I = ε / Req,total", "P = ε·I o P = I²·Req"], "steps": ["Calcula primer la part externa del circuit.", "Afegeix la resistència interna en sèrie amb el generador.", "Calcula la intensitat total.", "Calcula la potència i indica si és generada o consumida."], "solution": "En un generador real, la resistència interna s’ha d’afegir al circuit. La intensitat total depèn de ε i de la suma de totes les resistències equivalents. Cal incloure la interna abans de fer I = ε/R.", "errors": ["Oblidar la resistència interna.", "Fer servir V als borns com si fos sempre igual a ε."]}, {"id": "3t-2p-ex1-codi-colors", "exam": "2n parcial 3r trimestre 2025-26", "theme": "Codi de colors de resistències", "subthemes": ["valor nominal", "tolerància", "màxim i mínim"], "type": "Problema procedimental", "level": "N2", "points": "1,5 punts", "statement": "Determina el valor nominal, la tolerància i el valor màxim i mínim de les resistències: marró-negre-marró-plata; blau-negre-verd-plata; groc-violeta-vermell-or; groc-taronja-negre-or; verd-blau-groc-or.", "data": ["Codi: 1a xifra, 2a xifra, multiplicador i tolerància", "Or = ±5%", "Plata = ±10%"], "formulas": ["Valor = (dues xifres) · 10^multiplicador", "Màxim = valor · (1 + tolerància)", "Mínim = valor · (1 - tolerància)"], "steps": ["Transforma cada color en xifra o multiplicador.", "Calcula el valor nominal.", "Aplica tolerància per trobar mínim i màxim."], "solution": "Marró-negre-marró-plata: 10·10 = 100 Ω ±10% → 90-110 Ω. Blau-negre-verd-plata: 60·10^5 = 6 MΩ ±10%. Groc-violeta-vermell-or: 47·10^2 = 4700 Ω ±5%. Groc-taronja-negre-or: 43·1 = 43 Ω ±5%. Verd-blau-groc-or: 56·10^4 = 560 kΩ ±5%.", "errors": ["Confondre tercer color amb tercera xifra.", "No calcular màxim i mínim.", "Confondre or i plata."], "calc": "colorcode"}, {"id": "3t-2p-ex2-led-resistencia", "exam": "2n parcial 3r trimestre 2025-26", "theme": "LED i resistència limitadora", "subthemes": ["llei d’Ohm", "potència", "codi de colors"], "type": "Problema numèric", "level": "N3", "points": "1,5 punts", "statement": "En un circuit amb una pila de 9 V, una resistència i un LED en sèrie, si volem que el LED no rebi més de 2 V, quina potència dissipa la resistència si la intensitat ha de ser de 20 mA? De quants ohms ha de ser com a mínim la resistència? Quin codi de colors ha de tenir?", "data": ["V pila = 9 V", "V LED = 2 V", "I = 20 mA = 0,02 A", "V resistència = 7 V"], "formulas": ["R = V_R / I", "P_R = V_R · I"], "steps": ["Calcula la tensió que ha de caure a la resistència.", "Converteix mA a A.", "Calcula R mínima.", "Calcula la potència dissipada.", "Busca un codi de colors proper."], "solution": "V_R = 9-2 = 7 V. I = 0,02 A. R = 7/0,02 = 350 Ω. P = 7·0,02 = 0,14 W. Una resistència comercial propera podria ser 350 Ω si està disponible o un valor superior normalitzat per protegir el LED. Codi de 350 Ω: taronja-verd-marró i tolerància segons la banda final.", "errors": ["Fer R = 9/0,02 sense restar la tensió del LED.", "No passar 20 mA a 0,02 A.", "Escollir una resistència inferior i sobrepassar la intensitat."], "calc": "led"}, {"id": "3t-2p-ex3-bateries-equivalent", "exam": "2n parcial 3r trimestre 2025-26", "theme": "Generadors equivalents", "subthemes": ["piles en sèrie", "piles en paral·lel", "tensió als borns"], "type": "Problema numèric", "level": "N3", "points": "2 punts", "statement": "Tenim 8 bateries, cadascuna amb ε = 1,5 V i r = 0,2 Ω, connectades a una resistència externa R = 10 Ω. Calcula el generador equivalent, la intensitat i la tensió als borns si: a) estan en sèrie, b) acoblament mixt amb 4 branques en paral·lel de 2 piles a cada branca.", "data": ["8 piles", "ε = 1,5 V", "r = 0,2 Ω", "R externa = 10 Ω"], "formulas": ["Sèrie: εt = nε, rt = nr", "Paral·lel de branques iguals: εt = ε branca, rt = r branca / nombre de branques", "I = εt / (R + rt)", "Vb = εt - I·rt"], "steps": ["Calcula primer εt i rt segons la connexió.", "Afegeix la càrrega externa a la resistència interna.", "Calcula la intensitat total.", "Calcula la tensió als borns del generador."], "solution": "a) Sèrie: εt = 8·1,5 = 12 V; rt = 8·0,2 = 1,6 Ω. I = 12/(10+1,6)=1,034 A. Vb = 12 - 1,034·1,6 ≈ 10,35 V. b) Cada branca de 2 piles: ε = 3 V i r = 0,4 Ω. Quatre branques iguals en paral·lel: εt = 3 V i rt = 0,4/4 = 0,1 Ω. I = 3/(10+0,1)=0,297 A. Vb = 3 - 0,297·0,1 ≈ 2,97 V.", "errors": ["Sumar tensions en paral·lel.", "No dividir la resistència interna en branques paral·leles.", "Oblidar la resistència externa."], "calc": "generators"}, {"id": "3t-2p-ex4-kirchhoff", "exam": "2n parcial 3r trimestre 2025-26", "theme": "Lleis de Kirchhoff", "subthemes": ["malles", "nodes", "potència"], "type": "Problema amb figura", "level": "N4", "points": "2 punts", "statement": "Calcula les intensitats assenyalades I1, I2 i I3 i la potència que desenvolupa el circuit aplicant les lleis de Kirchhoff.", "data": ["Cal llegir el circuit original amb fonts i resistències."], "formulas": ["Llei de nodes: suma d’intensitats entrants = suma d’intensitats sortints", "Llei de malles: suma de tensions en una malla = 0", "P = V·I"], "steps": ["Assigna sentit a cada intensitat.", "Escriu equacions de node.", "Escriu equacions de malla.", "Resol el sistema.", "Interpreta signes negatius com a sentit contrari al triat."], "solution": "La resolució numèrica depèn de la figura. El mètode és plantejar un sistema d’equacions amb Kirchhoff. Si una intensitat surt negativa, vol dir que el sentit real és l’oposat al sentit suposat.", "errors": ["Canviar de criteri de signes a mitja resolució.", "No indicar el sentit triat per les intensitats.", "Confondre potència generada i potència dissipada."]}, {"id": "3t-ex1-electrons-temps", "exam": "3r trimestre 2025-26", "theme": "Electricitat bàsica", "subthemes": ["electrons", "càrrega", "temps"], "type": "Test amb càlcul", "level": "N2", "points": "1 punt", "statement": "Si volem que per un cable on circula una intensitat de 4 A passin exactament 2·10²² electrons, quant de temps haurà d’estar funcionant el circuit? Dada: 1 electró = 1,602·10⁻¹⁹ C.", "data": ["I=4 A", "n=2·10²² electrons", "e=1,602·10⁻¹⁹ C"], "formulas": ["Q = n·e", "t = Q/I"], "steps": ["Calcula la càrrega total dels electrons.", "Aïlla el temps amb t = Q/I.", "Converteix segons a minuts i segons."], "solution": "Q = 2·10²² · 1,602·10⁻¹⁹ = 3204 C. t = Q/I = 3204/4 = 801 s. 801 s = 13 min 21 s.", "errors": ["Dividir pel nombre d’electrons.", "No passar segons a minuts.", "Confondre 10²² i 10⁻¹⁹."], "calc": "charge_time"}, {"id": "3t-ex2-motor-rendiment", "exam": "3r trimestre 2025-26", "theme": "Motors i rendiment", "subthemes": ["potència absorbida", "potència útil", "energia mensual", "cost"], "type": "Test amb càlcul", "level": "N3", "points": "1 punt", "statement": "Un motor elèctric té R = 1,5 Ω i I = 600 mA. El rendiment és del 80%. Funciona 4 h/dia durant 30 dies. Calcula potència absorbida, potència útil, energia consumida al mes i cost mensual a 0,22 €/kWh.", "data": ["R = 1,5 Ω", "I = 0,6 A", "η = 0,80", "t = 4·30 = 120 h", "preu = 0,22 €/kWh"], "formulas": ["Pabs = I²·R", "Pu = η·Pabs", "E = P·t", "Cost = E·preu"], "steps": ["Converteix 600 mA a 0,6 A.", "Calcula Pabs amb I²R.", "Aplica el rendiment.", "Passa W a kW per calcular kWh.", "Multiplica pel preu."], "solution": "Pabs = 0,6²·1,5 = 0,54 W. Pu = 0,8·0,54 = 0,432 W. Energia mensual = 0,00054 kW · 120 h = 0,0648 kWh. Cost = 0,0648·0,22 ≈ 0,014 €.", "errors": ["No convertir mA a A.", "Confondre 0,54 W amb 540 W.", "Aplicar el rendiment a l’energia en lloc de la potència útil sense justificar."], "calc": "motor_eff_small"}, {"id": "3t-ex3-potencia-maxima-tolerancia", "exam": "3r trimestre 2025-26", "theme": "Resistències i tolerància", "subthemes": ["tolerància", "potència", "pitjor cas"], "type": "Test amb càlcul", "level": "N3", "points": "1 punt", "statement": "Una resistència de 800 Ω té una tolerància del 5%. Si hi circula una intensitat de 0,5 A, quina potència màxima podria dissipar en el pitjor dels casos?", "data": ["Rnom = 800 Ω", "tolerància = 5%", "I = 0,5 A"], "formulas": ["Rmax = Rnom·(1+tolerància)", "P = I²·R"], "steps": ["Calcula la resistència màxima admissible.", "Aplica P = I²R amb R màxima.", "Indica que és el pitjor cas perquè la potència augmenta amb R si I és constant."], "solution": "Rmax = 800·1,05 = 840 Ω. Pmax = 0,5²·840 = 0,25·840 = 210 W.", "errors": ["Usar R mínima per calcular potència màxima.", "No aplicar la tolerància.", "Confondre corrent constant amb tensió constant."], "calc": "tolerance_power"}, {"id": "3t-ex4-fcem-motor", "exam": "3r trimestre 2025-26", "theme": "Generadors i receptors", "subthemes": ["força contraelectromotriu", "motor CC", "resistències internes"], "type": "Problema numèric", "level": "N3", "points": "0,5 punts", "statement": "Un generador amb f.e.m. de 12 V i resistència interna 0,8 Ω alimenta un motor amb resistència interna de 5 Ω. El corrent és 1,5 A i la resistència dels conductors és 0,2 Ω. Calcula la fcem que desenvolupa el motor.", "data": ["ε = 12 V", "r_generador = 0,8 Ω", "r_motor = 5 Ω", "r_conductors = 0,2 Ω", "I = 1,5 A"], "formulas": ["ε = I·(r_g + r_m + r_c) + E’", "E’ = ε - I·R_total_resistiu"], "steps": ["Suma totes les resistències resistives del circuit.", "Calcula la caiguda de tensió resistiva.", "Resta-la a la f.e.m. del generador per obtenir la fcem."], "solution": "R resistiva total = 0,8+5+0,2 = 6 Ω. Caiguda resistiva = I·R = 1,5·6 = 9 V. fcem del motor = 12 - 9 = 3 V.", "errors": ["No incloure la resistència dels conductors.", "Sumar la fcem en lloc de restar-la.", "Oblidar que el motor  temps el cicle són dues voltes.", "No convertir kg a mg.", "Fer servir el poder calorífic quan no cal per a la massa per cicle."], "calc": "fuel_cycle"}, {"id": "recup-ex2-aigua-calor", "exam": "Recuperació 1r BATX 2025-26", "theme": "Calor i energia", "subthemes": ["calor específica", "temperatura final"], "type": "Test amb càlcul", "level": "N2", "points": "1 punt", "statement": "Una resistència elèctrica proporciona 3000 J a 50 ml d’aigua que es troben a 5 °C. Sabent que ce = 4,18 kJ/(kg·K), calcula la temperatura final de l’aigua.", "data": ["E = 3000 J", "V = 50 ml → m ≈ 0,05 kg", "T inicial = 5 °C", "ce = 4180 J/(kg·K)"], "formulas": ["Q = m·ce·ΔT", "Tf = Ti + ΔT"], "steps": ["Passa 50 ml d’aigua a kg.", "Passa ce a J/(kg·K).", "Aïlla ΔT.", "Suma l’increment a la temperatura inicial."], "solution": "m≈0,05 kg. ΔT = Q/(m·ce)=3000/(0,05·4180)=3000/209≈14,35 °C. Tf = 5 + 14,35 = 19,35 °C.", "errors": ["No sumar la temperatura inicial.", "No convertir kJ a J.", "Pensar que 50 ml són 50 kg."], "calc": "water_heat"}, {"id": "recup-ex3-plaques-solars", "exam": "Recuperació 1r BATX 2025-26", "theme": "Energia solar fotovoltaica", "subthemes": ["irradiació", "rendiment", "energia mensual"], "type": "Test amb càlcul", "level": "N2", "points": "1 punt", "statement": "Un habitatge disposa de vuit plaques solars amb àrea total 4,4 m². Al setembre hi ha irradiació diària mitjana de 13 kWh/m². Si el rendiment és 0,3, calcula l’energia produïda durant el mes de setembre.", "data": ["A = 4,4 m²", "irradiació = 13 kWh/m²·dia", "η = 0,3", "setembre = 30 dies"], "formulas": ["E = irradiació · àrea · rendiment · dies"], "steps": ["Calcula energia diària incident.", "Aplica rendiment.", "Multiplica pels dies del mes."], "solution": "E = 13·4,4·0,3·30 = 514,8 kWh.", "errors": ["Oblidar multiplicar pels 30 dies.", "No aplicar el rendiment.", "Confondre kWh amb J."], "calc": "solar"}, {"id": "recup-ex4-resistivitat-calefactor", "exam": "Recuperació 1r BATX 2025-26", "theme": "Resistivitat i potència", "subthemes": ["resistència d’un conductor", "potència"], "type": "Test amb càlcul", "level": "N3", "points": "1 punt", "statement": "El fil d’un calefactor té resistivitat ρ = 16·10⁻⁹ Ω·m, diàmetre 0,12 mm i longitud 30 m. Calcula la potència consumida quan es connecta a 230 V.", "data": ["ρ = 16·10⁻⁹ Ω·m", "d = 0,12 mm = 0,00012 m", "L = 30 m", "V = 230 V"], "formulas": ["A = π·d²/4", "R = ρ·L/A", "P = V²/R"], "steps": ["Converteix el diàmetre a metres.", "Calcula la secció del fil.", "Calcula la resistència amb la resistivitat.", "Calcula la potència."], "solution": "A = π(0,00012)²/4 ≈ 1,131·10⁻⁸ m². R = 16·10⁻⁹·30 / A ≈ 42,44 Ω. P = 230²/42,44 ≈ 1246 W = 1,246 kW.", "errors": ["No passar mm a m.", "Usar radi com si fos diàmetre.", "Confondre 16·10⁻⁹ amb 16·10⁹."], "calc": "resistivity"}, {"id": "recup-ex5-patinet", "exam": "Recuperació 1r BATX 2025-26", "theme": "Motors, energia i rendiment", "subthemes": ["patinet elèctric", "pendent", "parell", "bateria"], "type": "Problema llarg", "level": "N4", "points": "2,5 punts", "statement": "Una persona amb patinet elèctric té U=24 V, Ebat=250 Wh, motor de rendiment 0,85, roda de diàmetre 140 mm, massa total 70 kg, recorregut de 2 km a 8 km/h en una pujada de 7°. Determina: a) potència elèctrica consumida, b) velocitat angular del motor i parell, c) percentatge d’energia consumida de la bateria.", "data": ["U=24 V", "Ebat=250 Wh", "η=0,85", "d=0,14 m", "m=70 kg", "s=2000 m", "v=8 km/h=2,222 m/s", "α=7°"], "formulas": ["F = m·g·sinα", "Pmec = F·v", "Pel = Pmec/η", "ω = v/r", "Γ = Pmec/ω", "E = Pel·t", "t = s/v"], "steps": ["Converteix la velocitat a m/s.", "Calcula la força necessària per pujar el pendent.", "Calcula la potència mecànica.", "Aplica el rendiment per obtenir potència elèctrica.", "Calcula ω amb el radi de la roda.", "Calcula el parell.", "Calcula el temps i l’energia consumida.", "Compara amb la capacitat de la bateria."], "solution": "v = 8/3,6 = 2,222 m/s. F = 70·9,81·sin7° ≈ 83,7 N. Pmec = F·v ≈ 186 W. Pel ≈ 186/0,85 ≈ 219 W. r=0,07 m, ω=v/r≈31,75 rad/s. Γ=Pmec/ω≈5,86 N·m. t=s/v=2000/2,222≈900 s=0,25 h. Eel=219·0,25≈54,8 Wh. Percentatge=54,8/250·100≈21,9%.", "errors": ["No convertir km/h a m/s.", "Usar diàmetre en lloc de radi.", "Oblidar el rendiment del motor.", "Fer servir cos en lloc de sin per la component del pes en pendent."], "calc": "scooter"}];</script>

": "Problema numèric derivat", "level": "N3", "points": "pràctica", "statement": "Una caldera consumeix gas natural per obtenir 500 L/h d’aigua calenta de 20 °C a 90 °C. Planteja el càlcul del rendiment si coneixes el poder calorífic real del gas i el cabal consumit.", "data": ["q aigua=500 L/h", "T1=20 °C", "T2=90 °C", "ce=4,18 kJ/(kg·°C)"], "formulas": ["Eu=m·ce·ΔT", "Ec=Vgas·pc", "η=Eu/Ec"], "steps": ["Calcula calor útil de l’aigua.", "Calcula energia química consumida pel gas.", "Divideix energia útil entre consumida."], "solution": "La calor útil és Eu=500·4,18·70=146300 kJ per hora. El rendiment es calcula amb η=Eu/(Vgas·pc).", "errors": ["Usar temperatura final en lloc de ΔT.", "No posar les energies en les mateixes unitats."]}, {"id": "mc1-u2-perdues-linia", "exam": "McGraw 1r BAT · Unitat 2 · Producció i distribució elèctrica", "theme": "Electricitat i xarxes de distribució", "subthemes": ["línies elèctriques", "pèrdues Joule", "trifàsica introductòria"], "type": "Problema guiat derivat", "level": "N4", "points": "pràctica", "statement": "Compara qualitativament i amb fórmules per què transportar la mateixa potència a alta tensió redueix les pèrdues per efecte Joule en una línia.", "data": ["P transportada constant", "tensió alta o baixa", "conductors amb resistència"], "formulas": ["P=√3·U·I·cosφ", "Ppèrdues=3·R·I²"], "steps": ["Relaciona potència, tensió i intensitat.", "Observa que si U puja, I baixa.", "Com que les pèrdues depenen de I², baixen molt."], "solution": "A potència constant, I=P/(√3·U·cosφ). Si augmenta U, la intensitat disminueix. Les pèrdues són proporcionals a I²; per això l’alta tensió redueix molt l’escalfament dels cables.", "errors": ["Dir que l’alta tensió redueix la resistència del cable.", "No distingir potència transportada i pèrdues."]}, {"id": "mc1-u2-hidroelectrica", "exam": "McGraw 1r BAT · Unitat 2 · Producció i distribució elèctrica", "theme": "Centrals elèctriques i combustibles", "subthemes": ["hidroelèctrica", "cabal", "s
